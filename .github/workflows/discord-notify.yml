name: Discord Notify

on:
  pull_request_target:
    types: [opened, closed, reopened]
  issues:
    types: [opened, closed]

permissions:
  contents: read
  pull-requests: read

jobs:
  notify:
    runs-on: ubuntu-latest

    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_URL: ${{ github.event.pull_request.html_url }}
      PR_AUTHOR: ${{ github.event.pull_request.user.login }}
      PR_BRANCH: ${{ github.event.pull_request.head.ref }}
      PR_BASE: ${{ github.event.pull_request.base.ref }}
      PR_COMMITS: ${{ github.event.pull_request.commits }}
      PR_FILES: ${{ github.event.pull_request.changed_files }}
      PR_ADDITIONS: ${{ github.event.pull_request.additions }}
      PR_DELETIONS: ${{ github.event.pull_request.deletions }}
      PR_MERGED: ${{ github.event.pull_request.merged }}

      ISSUE_TITLE: ${{ github.event.issue.title }}
      ISSUE_URL: ${{ github.event.issue.html_url }}
      ISSUE_AUTHOR: ${{ github.event.issue.user.login }}

      EVENT_NAME: ${{ github.event_name }}
      ACTION: ${{ github.event.action }}
      REPO: ${{ github.repository }}

    steps:
      - name: Send Discord notification
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL secret is missing"
            exit 1
          fi

          if [ "$EVENT_NAME" = "pull_request_target" ]; then
            EVENT_NAME="pull_request"
          fi

          if [ "$EVENT_NAME" = "pull_request" ]; then
            if [ "$ACTION" = "opened" ]; then
              TITLE="📬 Новый пул реквест"
              COLOR=3447003
            elif [ "$ACTION" = "reopened" ]; then
              TITLE="🔄 Пул реквест переоткрыт"
              COLOR=16776960
            elif [ "$ACTION" = "closed" ] && [ "$PR_MERGED" = "true" ]; then
              TITLE="✅ Пул реквест смерджен"
              COLOR=5763719
            else
              TITLE="❌ Пул реквест закрыт"
              COLOR=10038562
            fi

            PAYLOAD=$(jq -n \
              --arg title "$TITLE: $PR_TITLE" \
              --arg url "$PR_URL" \
              --arg author "$PR_AUTHOR" \
              --arg branch "$PR_BRANCH" \
              --arg base "$PR_BASE" \
              --arg commits "$PR_COMMITS" \
              --arg files "$PR_FILES" \
              --arg additions "$PR_ADDITIONS" \
              --arg deletions "$PR_DELETIONS" \
              --arg repo "$REPO" \
              --argjson color "$COLOR" \
              '{
                embeds: [{
                  title: $title,
                  url: $url,
                  color: $color,
                  fields: [
                    {name: "👤 Автор", value: $author, inline: true},
                    {name: "🌿 Ветка", value: ($branch + " → " + $base), inline: true},
                    {name: "📊 Изменения", value: ("+\($additions) / -\($deletions) | \($commits) коммитов, \($files) файлов"), inline: false}
                  ],
                  footer: {text: $repo}
                }]
              }')

          elif [ "$EVENT_NAME" = "issues" ]; then
            if [ "$ACTION" = "opened" ]; then
              TITLE="🐛 Новый репорт"
              COLOR=15548997
            else
              TITLE="🔒 Репорт закрыт"
              COLOR=9807270
            fi

            PAYLOAD=$(jq -n \
              --arg title "$TITLE: $ISSUE_TITLE" \
              --arg url "$ISSUE_URL" \
              --arg author "$ISSUE_AUTHOR" \
              --arg repo "$REPO" \
              --argjson color "$COLOR" \
              '{
                embeds: [{
                  title: $title,
                  url: $url,
                  color: $color,
                  fields: [
                    {name: "👤 Автор", value: $author, inline: true}
                  ],
                  footer: {text: $repo}
                }]
              }')
          fi

          curl \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL"
